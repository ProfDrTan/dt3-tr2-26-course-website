<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Leaderboard · CP3405 DT3 TR2 2026</title>
<style>
:root{--navy:#0a1628;--navy-2:#0d1f3c;--gold:#c9a84c;--white:#f0f4fa;--muted:#8fa3bf;--danger:#e05c5c;--navy-3:#112244;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--navy);color:var(--white);font-family:'Segoe UI',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.box{background:var(--navy-2);border:1px solid rgba(201,168,76,.3);border-radius:16px;padding:2.5rem;text-align:center;max-width:340px;width:100%;}
h2{color:var(--gold);font-size:1.3rem;margin-bottom:.5rem;}
p{color:var(--muted);font-size:.88rem;margin-bottom:1.5rem;}
input{background:var(--navy-3);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:var(--white);font-size:1.4rem;letter-spacing:.4em;padding:.75rem 1rem;text-align:center;width:100%;margin-bottom:1rem;outline:none;}
input:focus{border-color:var(--gold);}
button{background:var(--gold);color:#071426;font-weight:900;padding:.75rem;border-radius:99px;border:none;cursor:pointer;width:100%;font-size:.95rem;}
.err{color:var(--danger);font-size:.82rem;margin-top:.5rem;display:none;}
</style>
</head>
<body>
<div class="box">
  <h2>🔒 Leaderboard</h2>
  <p>CP3405 DT3 TR2 2026 · Instructor access only</p>
  <input type="password" id="pin" placeholder="PIN" maxlength="8"
         onkeydown="if(event.key==='Enter')go()">
  <button onclick="go()">Unlock</button>
  <div class="err" id="err">Incorrect PIN.</div>
</div>
<script>
function go(){
  if(document.getElementById('pin').value.trim()==='3405'){
    window.location.href='/leaderboard/index.html?pin=3405';
  } else {
    document.getElementById('err').style.display='block';
    document.getElementById('pin').value='';
  }
}
(function(){
  const p=new URLSearchParams(location.search);
  if(p.get('pin')==='3405') window.location.href='/leaderboard/index.html?pin=3405';
})();
</script>
</body>
</html>
