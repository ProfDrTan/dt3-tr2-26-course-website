<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Team Pipeline Dashboard · CP3405 DT3 TR2 2026</title>
<meta http-equiv="refresh" content="300"><!-- auto-refresh every 5 min -->
<style>
  :root {
    --navy:#0a1628;--navy-2:#0d1f3c;--navy-3:#112244;
    --gold:#c9a84c;--teal:#2dd4bf;--white:#f0f4fa;--muted:#8fa3bf;
    --success:#3dcc8a;--danger:#e05c5c;--warn:#f0a500;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--navy);color:var(--white);font-family:'Segoe UI',system-ui,sans-serif;font-size:15px;line-height:1.6;}
  header{background:linear-gradient(135deg,#070e1c,var(--navy-3));border-bottom:2px solid var(--gold);padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
  .header-left h1{font-size:1.4rem;color:var(--gold);font-weight:700;}
  .header-left p{font-size:.8rem;color:var(--muted);margin-top:.2rem;}
  .live-badge{background:rgba(61,204,138,.15);color:var(--success);border:1px solid rgba(61,204,138,.3);border-radius:99px;padding:.3rem .8rem;font-size:.75rem;font-weight:700;letter-spacing:.08em;}
  nav{background:var(--navy-2);border-bottom:1px solid rgba(201,168,76,.2);padding:.6rem 2rem;display:flex;gap:1.25rem;flex-wrap:wrap;}
  nav a{color:var(--muted);text-decoration:none;font-size:.85rem;}
  nav a:hover{color:var(--gold);}
  nav a.active{color:var(--gold);font-weight:600;}
  main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem;}

  /* ── Summary strip ── */
  .summary-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem;margin-bottom:2rem;}
  .summary-card{background:var(--navy-2);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:1rem;text-align:center;}
  .summary-card .val{font-size:1.8rem;font-weight:800;color:var(--teal);line-height:1;}
  .summary-card .val.gold{color:var(--gold);}
  .summary-card .val.danger{color:var(--danger);}
  .summary-card .lbl{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:.3rem;}

  /* ── Team cards ── */
  .teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.25rem;}
  .team-card{background:var(--navy-2);border:1px solid rgba(255,255,255,.08);border-radius:12px;overflow:hidden;}
  .team-card.healthy{border-color:rgba(61,204,138,.25);}
  .team-card.warning{border-color:rgba(240,165,0,.3);}
  .team-card.failing{border-color:rgba(224,92,92,.3);}
  .team-header{padding:.9rem 1.1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07);}
  .team-name{font-size:1rem;font-weight:700;color:var(--white);}
  .team-prac{font-size:.72rem;color:var(--muted);background:rgba(255,255,255,.05);padding:.15rem .5rem;border-radius:4px;}
  .status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .dot-green{background:var(--success);box-shadow:0 0 6px var(--success);}
  .dot-red{background:var(--danger);box-shadow:0 0 6px var(--danger);}
  .dot-orange{background:var(--warn);box-shadow:0 0 6px var(--warn);}
  .dot-grey{background:var(--muted);}
  .team-body{padding:1rem 1.1rem;display:flex;flex-direction:column;gap:.6rem;}
  .row{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;font-size:.85rem;}
  .row-label{color:var(--muted);white-space:nowrap;flex-shrink:0;}
  .row-val{color:var(--white);text-align:right;word-break:break-word;}
  .row-val.ok{color:var(--success);}
  .row-val.fail{color:var(--danger);}
  .row-val.warn{color:var(--warn);}
  .tag-chip{display:inline-block;padding:.1rem .45rem;border-radius:4px;font-size:.75rem;font-weight:600;margin:.1rem;}
  .tag-correct{background:rgba(61,204,138,.15);color:var(--success);}
  .tag-wrong{background:rgba(240,165,0,.15);color:var(--warn);}
  .tag-other{background:rgba(143,163,191,.1);color:var(--muted);}
  .commit-msg{font-size:.78rem;color:var(--muted);border-left:2px solid rgba(45,212,191,.2);padding-left:.5rem;margin-top:.2rem;word-break:break-word;}
  .pr-badge{background:rgba(45,212,191,.15);color:var(--teal);border-radius:4px;padding:.1rem .4rem;font-size:.75rem;font-weight:700;}

  /* ── Repo link ── */
  .repo-link{display:block;padding:.6rem 1.1rem;border-top:1px solid rgba(255,255,255,.05);font-size:.78rem;color:var(--teal);text-decoration:none;}
  .repo-link:hover{background:rgba(45,212,191,.05);}

  /* ── Loading/error state ── */
  .loading{text-align:center;padding:4rem;color:var(--muted);}
  .error-box{background:rgba(224,92,92,.1);border:1px solid rgba(224,92,92,.3);border-radius:8px;padding:1rem;color:var(--danger);margin-bottom:1.5rem;}

  /* ── Last updated ── */
  .last-updated{text-align:right;font-size:.75rem;color:var(--muted);margin-bottom:1rem;}

  footer{border-top:1px solid rgba(201,168,76,.15);padding:1.25rem 2rem;text-align:center;font-size:.78rem;color:var(--muted);}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Team Pipeline Dashboard</h1>
    <p>CP3405 DT3 TR2 2026 · Sprint 6 · vW28 · Auto-refreshes every 5 minutes</p>
  </div>
  <span class="live-badge">● LIVE</span>
</header>

<nav>
  <a href="/">Home</a>
  <a href="/sprint6/">Sprint 6</a>
  <a href="/scrum/">Scrum Reference</a>
  <a href="/dashboard/" class="active">Dashboard</a>
  <a href="/roadmap/">Roadmap</a>
</nav>

<main>
  <div id="app"><div class="loading">Loading team data...</div></div>
</main>

<footer>CP3405 DT3 TR2 2026 · Dashboard · Data from GitHub API · Updated every 30 min via GitHub Actions</footer>

<script>
const DASHBOARD_JSON = 'https://raw.githubusercontent.com/ProfDrTan/dt3-monitor/main/dt3_dashboard.json';
const SPRINT_TAG = 'vW28';

async function load() {
  const app = document.getElementById('app');
  try {
    const r = await fetch(DASHBOARD_JSON + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    render(data);
  } catch (e) {
    app.innerHTML = `
      <div class="error-box">⚠️ Could not load dashboard data: ${e.message}<br>
      The GitHub Actions monitor may not have run yet, or the JSON file doesn't exist.<br>
      <small>Expected: ${DASHBOARD_JSON}</small></div>
      <div class="loading">Retrying in 60 seconds...</div>`;
    setTimeout(load, 60000);
  }
}

function tagChip(tag) {
  const cls = tag === SPRINT_TAG ? 'tag-correct' :
              tag.match(/^v?W\d+$/) ? 'tag-wrong' : 'tag-other';
  return `<span class="tag-chip ${cls}">${tag}</span>`;
}

function runIcon(conclusion) {
  if (conclusion === 'success') return '<span class="row-val ok">✅ passing</span>';
  if (conclusion === 'failure') return '<span class="row-val fail">❌ failed</span>';
  if (conclusion === 'none')    return '<span class="row-val" style="color:var(--muted)">—</span>';
  return `<span class="row-val warn">⏳ ${conclusion}</span>`;
}

function cardClass(team) {
  if (team.last_run_conclusion === 'failure') return 'failing';
  if (!team.sprint_tag_present) return 'warning';
  if (team.days_since_commit > 3) return 'warning';
  return 'healthy';
}

function dotClass(team) {
  if (team.last_run_conclusion === 'failure') return 'dot-red';
  if (!team.sprint_tag_present) return 'dot-orange';
  return 'dot-green';
}

function render(data) {
  const teams = data.teams || [];

  // Summary stats
  const tagged  = teams.filter(t => t.sprint_tag_present).length;
  const failing = teams.filter(t => t.last_run_conclusion === 'failure').length;
  const active  = teams.filter(t => t.days_since_commit <= 2).length;
  const prs     = teams.reduce((s, t) => s + (t.open_prs || 0), 0);

  let html = `
    <div class="last-updated">Last data: ${data.updated} · Next refresh in ~5 min</div>
    <div class="summary-strip">
      <div class="summary-card"><div class="val ${tagged===5?'ok':''}">${tagged}/5</div><div class="lbl">${SPRINT_TAG} Tagged</div></div>
      <div class="summary-card"><div class="val ${failing>0?'danger':''}">${failing}</div><div class="lbl">Pipeline Failures</div></div>
      <div class="summary-card"><div class="val gold">${active}</div><div class="lbl">Active (48h)</div></div>
      <div class="summary-card"><div class="val">${prs}</div><div class="lbl">Open PRs</div></div>
      <div class="summary-card"><div class="val">${teams.length}</div><div class="lbl">Teams</div></div>
    </div>
    <div class="teams-grid">`;

  for (const t of teams) {
    const tags = (t.tags || []).slice(0, 6);
    html += `
      <div class="team-card ${cardClass(t)}">
        <div class="team-header">
          <div>
            <div class="team-name">${t.name}</div>
            <div style="font-size:.72rem;color:var(--muted)">${t.repo}</div>
          </div>
          <div style="display:flex;align-items:center;gap:.5rem">
            <span class="team-prac">Prac ${t.prac}</span>
            <div class="status-dot ${dotClass(t)}"></div>
          </div>
        </div>
        <div class="team-body">
          <div class="row">
            <span class="row-label">${SPRINT_TAG} tag</span>
            ${t.sprint_tag_present
              ? `<span class="row-val ok">✅ Present</span>`
              : `<span class="row-val fail">❌ Not yet cut</span>`}
          </div>
          <div class="row">
            <span class="row-label">All tags</span>
            <span class="row-val">${tags.length ? tags.map(tagChip).join('') : '<span style="color:var(--muted)">none</span>'}</span>
          </div>
          <div class="row">
            <span class="row-label">Last commit</span>
            <span class="row-val">${t.last_commit_date || '—'}</span>
          </div>
          <div class="commit-msg">${t.last_commit_sha || ''} ${t.last_commit_author ? '· ' + t.last_commit_author : ''}<br>${t.last_commit_msg || ''}</div>
          <div class="row">
            <span class="row-label">Pipeline</span>
            ${runIcon(t.last_run_conclusion)}
          </div>
          <div class="row" style="font-size:.78rem">
            <span class="row-label">Last run</span>
            <span style="color:var(--muted)">${t.last_run_name || '—'} ${t.last_run_date ? '· ' + t.last_run_date : ''}</span>
          </div>
          ${t.open_prs > 0 ? `
          <div class="row">
            <span class="row-label">Open PRs</span>
            <span class="pr-badge">${t.open_prs} open</span>
          </div>` : ''}
          <div class="row">
            <span class="row-label">Days since commit</span>
            <span class="row-val ${t.days_since_commit > 3 ? 'warn' : ''}">${t.days_since_commit ?? '—'}</span>
          </div>
        </div>
        <a class="repo-link" href="https://github.com/${t.repo}" target="_blank">
          View on GitHub →
        </a>
      </div>`;
  }

  html += `</div>`;
  document.getElementById('app').innerHTML = html;
}

load();
</script>
</body>
</html>
