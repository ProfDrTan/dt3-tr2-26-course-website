<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DT3 Pipeline Dashboard</title>
<style>
:root{--navy:#0a1628;--navy-2:#0d1f3c;--navy-3:#112244;--gold:#c9a84c;--teal:#2dd4bf;--white:#f0f4fa;--muted:#8fa3bf;--success:#3dcc8a;--danger:#e05c5c;--warn:#f0a500;--purple:#a78bfa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--navy);color:var(--white);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;}
header{background:linear-gradient(135deg,#070e1c,var(--navy-3));border-bottom:2px solid var(--gold);padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;}
.h1{font-size:1.25rem;color:var(--gold);font-weight:700;}
.hsub{font-size:.75rem;color:var(--muted);margin-top:.15rem;}
.live{background:rgba(61,204,138,.15);color:var(--success);border:1px solid rgba(61,204,138,.3);border-radius:99px;padding:.25rem .75rem;font-size:.72rem;font-weight:700;}
main{max-width:1280px;margin:0 auto;padding:1.5rem 1.25rem 3rem;}
.sbar{background:var(--navy-2);border-radius:10px;padding:.75rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;font-size:.8rem;}
.sbar-l{color:var(--muted);}
.sbar-l span{color:var(--white);font-weight:600;}
.sbar-r{display:flex;gap:.75rem;align-items:center;}
.rbtn{background:rgba(45,212,191,.12);color:var(--teal);border:1px solid rgba(45,212,191,.25);border-radius:6px;padding:.35rem .9rem;font-size:.78rem;cursor:pointer;font-weight:600;}
.rbtn:hover{background:rgba(45,212,191,.2);}
.xbtn{background:rgba(143,163,191,.08);color:var(--muted);border:1px solid rgba(143,163,191,.15);border-radius:6px;padding:.35rem .9rem;font-size:.78rem;cursor:pointer;}
.cd{color:var(--teal);font-weight:600;font-size:.78rem;min-width:90px;text-align:right;}
.weekend-note{background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.35);color:#ffcf6b;padding:.6rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:.8rem;}
.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:.75rem;margin-bottom:1.5rem;}
.sc{background:var(--navy-2);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:.9rem;text-align:center;position:relative;overflow:hidden;}
.sc .val{font-size:1.7rem;font-weight:800;line-height:1;}
.ok{color:var(--success);}.gold{color:var(--gold);}.danger{color:var(--danger);}.teal{color:var(--teal);}
.sc .lbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:.35rem;}
.dbadge{position:absolute;top:.4rem;right:.5rem;font-size:.68rem;font-weight:700;padding:.1rem .35rem;border-radius:3px;}
.dup{background:rgba(61,204,138,.2);color:var(--success);}
.ddn{background:rgba(224,92,92,.2);color:var(--danger);}
.d0{background:rgba(143,163,191,.1);color:var(--muted);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:1rem;}
.tc{background:var(--navy-2);border:1px solid rgba(255,255,255,.08);border-radius:12px;overflow:hidden;}
.tc.healthy{border-color:rgba(61,204,138,.2);}.tc.warning{border-color:rgba(240,165,0,.3);}.tc.failing{border-color:rgba(224,92,92,.35);}
.tc.ultra{border-color:rgba(167,139,250,.4);box-shadow:0 0 0 1px rgba(167,139,250,.15);}
.th{padding:.85rem 1rem;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);}
.tn{font-size:.95rem;font-weight:700;}
.trepo{font-size:.67rem;color:var(--muted);margin-top:.1rem;}
.thr{display:flex;align-items:center;gap:.4rem;flex-shrink:0;}
.tp{font-size:.67rem;color:var(--muted);background:rgba(255,255,255,.05);padding:.1rem .4rem;border-radius:3px;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dg{background:var(--success);box-shadow:0 0 5px var(--success);}
.dr{background:var(--danger);box-shadow:0 0 5px var(--danger);}
.do{background:var(--warn);box-shadow:0 0 5px var(--warn);}
.tb{padding:.85rem 1rem;display:flex;flex-direction:column;gap:.45rem;}
.row{display:flex;justify-content:space-between;align-items:center;gap:.5rem;font-size:.82rem;}
.rl{color:var(--muted);white-space:nowrap;flex-shrink:0;font-size:.77rem;}
.rv{color:var(--white);text-align:right;}
.rv.ok{color:var(--success);font-weight:600;}.rv.fail{color:var(--danger);font-weight:600;}.rv.warn{color:var(--warn);}
.inl{display:inline-block;font-size:.67rem;font-weight:700;padding:.08rem .3rem;border-radius:3px;margin-left:.3rem;vertical-align:middle;}
.inl-new{background:rgba(61,204,138,.2);color:var(--success);}
.inl-warn{background:rgba(240,165,0,.2);color:var(--warn);}
.inl-fail{background:rgba(224,92,92,.2);color:var(--danger);}
.chip{display:inline-block;padding:.08rem .38rem;border-radius:4px;font-size:.69rem;font-weight:600;margin:.07rem;}
.cok{background:rgba(61,204,138,.15);color:var(--success);}
.cwarn{background:rgba(240,165,0,.15);color:var(--warn);}
.cgrey{background:rgba(143,163,191,.1);color:var(--muted);}
.cmsg{font-size:.71rem;color:var(--muted);border-left:2px solid rgba(45,212,191,.15);padding-left:.45rem;margin-top:.1rem;line-height:1.4;}
.sep{border:none;border-top:1px solid rgba(255,255,255,.05);margin:.15rem 0;}
.rlink{display:block;padding:.5rem 1rem;border-top:1px solid rgba(255,255,255,.04);font-size:.73rem;color:var(--teal);text-decoration:none;}
.rlink:hover{background:rgba(45,212,191,.04);}
footer{border-top:1px solid rgba(201,168,76,.12);padding:1rem;text-align:center;font-size:.72rem;color:var(--muted);}
@media(max-width:700px){.summary{grid-template-columns:repeat(3,1fr);}.grid{grid-template-columns:1fr;}}
.verdict{display:flex;align-items:flex-start;gap:8px;padding:.6rem .7rem;border-radius:8px;margin-bottom:.5rem;font-size:.78rem;line-height:1.35;}
.verdict .vlabel{font-weight:800;letter-spacing:.03em;white-space:nowrap;}
.verdict.v-ok{background:rgba(61,204,138,.08);color:#8fe6bb;}
.verdict.v-warn{background:rgba(240,165,0,.1);color:#ffcf6b;}
.verdict.v-bad{background:rgba(224,92,92,.1);color:#ff9d9d;}
a.ev{color:var(--teal);text-decoration:none;border-bottom:1px dotted rgba(45,212,191,.4);}
a.ev:hover{color:#7ff5ea;}
.contrib-wrap{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.15rem;}
.pchip{display:inline-flex;align-items:center;gap:.25rem;padding:.15rem .5rem;border-radius:99px;font-size:.68rem;font-weight:600;text-decoration:none;border:1px solid transparent;}
.pchip.human{background:rgba(61,204,138,.12);color:#8fe6bb;border-color:rgba(61,204,138,.25);}
.pchip.human.champ{background:rgba(201,168,76,.18);color:var(--gold);border-color:rgba(201,168,76,.4);}
.pchip.bot{background:rgba(143,163,191,.08);color:var(--muted);border-color:rgba(143,163,191,.15);}
.pchip.unidentified{background:rgba(224,92,92,.12);color:#ff9d9d;border-color:rgba(224,92,92,.3);}
.pchip .n{font-weight:800;}
.pr-item{font-size:.73rem;padding:.15rem 0;}
.pr-item a{color:var(--teal);text-decoration:none;}
.pr-item a:hover{text-decoration:underline;}
.pr-auth{color:var(--muted);font-size:.68rem;}
.spark-wrap{margin-top:.3rem;}
.spark-lbl{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.15rem;}
svg.spark{display:block;}
.monday{background:var(--navy-2);border:1px solid rgba(201,168,76,.25);border-radius:12px;padding:1.1rem 1.3rem;margin-top:1.5rem;}
.monday h2{color:var(--gold);font-size:1rem;margin-bottom:.7rem;}
.monday .qteam{margin-bottom:.7rem;font-size:.82rem;}
.monday .qteam b{color:var(--white);}
.monday .qteam .q{color:var(--muted);margin-top:.15rem;}
.ultra-badge{background:rgba(167,139,250,.15);color:var(--purple);border:1px solid rgba(167,139,250,.35);border-radius:99px;padding:.1rem .5rem;font-size:.65rem;font-weight:700;}
</style>
</head>

</main>

let current = null, history_ = [], discord_ = null, timer = null, secs = 120;

function getBL() { try { return JSON.parse(localStorage.getItem(BL_KEY)); } catch(e) { return null; } }
function setBL(d) {
  const bl = {};
  d.teams.forEach(t => { bl[t.name] = { prs: t.open_prs||0, run: t.last_run_conclusion, tag: t.sprint_tag_present, sha: t.last_commit_sha }; });
  localStorage.setItem(BL_KEY, JSON.stringify(bl));
}
function resetDelta() { if(current){ setBL(current); render(current); } }

async function fetchLatest() {
  try {
    const url = 'https://raw.githubusercontent.com/ProfDrTan/dt3-tr2-26-course-website/main/dashboard/data.json?t=' + Date.now();
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) { setFetchStatus(false, 'HTTP ' + r.status); return null; }
    const j = await r.json();
    setFetchStatus(true);
    return j;
  } catch(e) { setFetchStatus(false, e.message); return null; }
}
async function fetchHistory() {
  try {
    const url = 'https://raw.githubusercontent.com/ProfDrTan/dt3-tr2-26-course-website/main/dashboard/history.json?t=' + Date.now();
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) return [];
    return await r.json();
  } catch(e) { return []; }
}
async function fetchDiscordSignals() {
  try {
    const url = 'https://raw.githubusercontent.com/ProfDrTan/dt3-tr2-26-course-website/main/dashboard/discord-signals.json?t=' + Date.now();
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

let lastFetchOk = null, lastFetchErr = null;
function setFetchStatus(ok, err) {
  lastFetchOk = ok; lastFetchErr = err || null;
  renderStaleness();
}
function renderStaleness() {
  const el = document.getElementById('stalewarn');
  if (!el) return;
  if (!current) { el.style.display = 'none'; return; }
  const updatedMs = Date.parse(current.updated.replace(' UTC','Z').replace(' ','T'));
  const ageMin = Math.round((Date.now() - updatedMs) / 60000);
  if (ageMin > 90 || lastFetchOk === false) {
    el.style.display = 'block';
    el.textContent = lastFetchOk === false
      ? `⚠️ Live refresh failing (${lastFetchErr}). Showing data from ${ageMin} min ago.`
      : `⚠️ Data is ${ageMin} min old — expected refresh every ~30 min from dt3-monitor.`;
  } else {
    el.style.display = 'none';
  }
}

async function doRefresh() {
  const btn = document.getElementById('rbtn');
  btn.textContent = '↻ loading...';
  btn.disabled = true;
  const [d, h, ds] = await Promise.all([fetchLatest(), fetchHistory(), fetchDiscordSignals()]);
  if (d) { current = d; if(!getBL()) setBL(d); }
  if (h && h.length) history_ = h;
  if (ds) discord_ = ds;
  render(current);
  btn.textContent = '↻ Refresh Now';
  btn.disabled = false;
  secs = 120;
}

function startTimer() {
  if(timer) clearInterval(timer);
  secs = 120;
  timer = setInterval(async () => {
    secs--;
    const m = Math.floor(secs/60), s = String(secs%60).padStart(2,'0');
    document.getElementById('cd').textContent = `next refresh in ${m}:${s}`;
    if (secs <= 0) { secs = 120; await doRefresh(); }
    renderStaleness();
  }, 1000);
}

// --- Singapore Time conversion (UTC+8). All source data/dates are UTC. ---
function toSGT(str, opts) {
  if (!str) return '—';
  const clean = str.replace(' UTC','').trim();
  const iso = clean.includes('T') ? clean : clean.replace(' ', 'T');
  const utcMs = Date.parse(iso + 'Z');
  if (isNaN(utcMs)) return str;
  const sgt = new Date(utcMs + 8*60*60*1000);
  const pad = n => String(n).padStart(2,'0');
  const y = sgt.getUTCFullYear(), mo = pad(sgt.getUTCMonth()+1), da = pad(sgt.getUTCDate());
  const hh = pad(sgt.getUTCHours()), mm = pad(sgt.getUTCMinutes());
  if (opts === 'time') return `${hh}:${mm}`;
  if (opts === 'short') return `${mo}-${da} ${hh}:${mm}`;
  return `${y}-${mo}-${da} ${hh}:${mm} SGT`;
}

function isWeekendSGT() {
  const nowSGT = new Date(Date.now() + 8*60*60*1000);
  const dow = nowSGT.getUTCDay();
  return dow === 0 || dow === 6;
}

function verdict(t) {
  const idle = t.days_since_commit ?? 99;
  const weekend = isWeekendSGT();
  if (t.last_run_conclusion === 'failure') {
    return { icon: '🔴', label: 'STUCK', cls: 'v-bad',
      reason: `Pipeline failing since ${toSGT(t.last_run_date,'short')} SGT — needs a fix before it can produce anything.` };
  }
  if (idle >= 10) {
    return { icon: '🔴', label: 'STALLED', cls: 'v-bad',
      reason: `No commits in ${idle} days. At this pace they will not make the vW28 deadline without action.` };
  }
  if (weekend && idle >= 1) {
    return { icon: '🟡', label: 'QUIET ON A WORKING WEEKEND', cls: 'v-warn',
      reason: `${idle} day(s) idle during the weekend, when Friday's close data is available and there's no class competing for time. Worth checking in directly.` };
  }
  if (idle >= 4) {
    return { icon: '🟡', label: 'SLOWING', cls: 'v-warn',
      reason: `${idle} days since last commit. Not stalled yet, but worth a nudge.` };
  }
  if (!t.sprint_tag_present) {
    return { icon: '🟢', label: 'ON TRACK', cls: 'v-ok',
      reason: `Active and pipeline healthy. vW28 tag not cut yet — normal this far ahead of Sunday's deadline.` };
  }
  return { icon: '🟢', label: 'READY', cls: 'v-ok',
    reason: `Active, pipeline healthy, and vW28 already tagged.` };
}

function chip(t) {
  const c = t===SPRINT?'cok':/^v?W\d+$/.test(t)?'cwarn':'cgrey';
  return `<span class="chip ${c}">${t}</span>`;
}
function runIco(c) {
  if(c==='success') return '<span class="rv ok">✅ passing</span>';
  if(c==='failure') return '<span class="rv fail">❌ FAILED</span>';
  return '<span class="rv" style="color:var(--muted)">—</span>';
}
function cc(t) {
  if(t.last_run_conclusion==='failure') return 'failing';
  if(!t.sprint_tag_present) return 'warning';
  return 'healthy';
}
function dc(t) {
  if(t.last_run_conclusion==='failure') return 'dr';
  if(!t.sprint_tag_present) return 'do';
  return 'dg';
}

// --- Contributor roll call ---
function contributorChips(t) {
  const contribs = t.contributors || [];
  if (!contribs.length) return '<span style="color:var(--muted);font-size:.72rem">No contributor data in this window.</span>';
  const maxHuman = Math.max(0, ...contribs.filter(c=>c.kind==='human').map(c=>c.commits));
  return contribs.map(c => {
    const isChamp = c.kind === 'human' && c.commits === maxHuman && maxHuman > 0;
    const cls = c.kind === 'human' ? ('human' + (isChamp?' champ':'')) : c.kind;
    const label = c.kind === 'unidentified' ? '❓ unidentified' : c.name;
    return `<a class="pchip ${cls}" href="${c.latest_url}" target="_blank" title="Latest: ${c.latest_msg}">${isChamp?'⭐ ':''}${label} <span class="n">×${c.commits}</span></a>`;
  }).join('');
}

function discordSignalHtml(teamName) {
  if (!discord_ || !discord_.teams) return '';
  const info = discord_.teams[teamName];
  if (!info || !info.blockers || !info.blockers.length) return '';
  const items = info.blockers.slice(0,3).map(b => {
    const safe = b.content.replace(/</g,'&lt;');
    return `<div style="font-size:.72rem;margin-top:.25rem;">
      <a class="ev" href="${b.url}" target="_blank">${b.author}</a>: ${safe}${b.content.length>200?'…':''}
    </div>`;
  }).join('');
  return `<div class="row"><span class="rl">💬 Discord signal</span></div>
    <div style="background:rgba(88,101,242,.08);border:1px solid rgba(88,101,242,.25);border-radius:6px;padding:.5rem .6rem;">
      <div style="font-size:.68rem;color:#a3aefe;font-weight:700;">FLAGGED — blocker/problem keywords, last 48h</div>
      ${items}
    </div>`;
}
// --- Monday talking points, generated from visible evidence only ---
function mondayQuestion(t) {
  const contribs = (t.contributors||[]).filter(c=>c.kind!=='bot');
  const humans = contribs.filter(c=>c.kind==='human');
  const unidentified = contribs.filter(c=>c.kind==='unidentified');
  const totalHuman = humans.reduce((s,c)=>s+c.commits,0);
  const top = humans.sort((a,b)=>b.commits-a.commits)[0];
  let lines = [];
  if (top && totalHuman>0) {
    const pct = Math.round(100*top.commits/totalHuman);
    lines.push(`Acknowledge <b>${top.name}</b> — ${top.commits} of ${totalHuman} visible commits this window (${pct}%). Ask them to walk through <a class="ev" href="${top.latest_url}" target="_blank">their latest commit</a>.`);
    if (pct >= 60 && humans.length > 1) {
      lines.push(`Concentration risk: most visible work is from one person. Ask the rest of the team directly what they've each been doing — non-code contributions (research, testing, writing) won't show up here.`);
    }
  }
  if (unidentified.length) {
    lines.push(`${unidentified.length} commit(s) came from an account GitHub couldn't link to a name — ask who <a class="ev" href="${unidentified[0].latest_url}" target="_blank">this commit</a> belongs to before assigning credit.`);
  }
  if (t.last_run_conclusion === 'failure') {
    lines.push(`Pipeline is failing — ask who owns fixing <a class="ev" href="${t.last_run_url}" target="_blank">this run</a> before Monday.`);
  }
  if (!lines.length) lines.push('No specific flags — review normally.');
  return lines.join('<br>');
}

// --- Sparkline SVG from history ---
function sparkline(teamName, field, color, opts) {
  opts = opts || {};
  const rows = history_.filter(h => h.team === teamName).slice(-60);
  const MIN_POINTS_FOR_TREND = 6;
  if (rows.length < 2) {
    return '<div style="font-size:.65rem;color:var(--muted)">No history yet — first data point just landed. Check back after a few more runs.</div>';
  }
  const vals = rows.map(r => r[field] ?? 0);
  const allSame = vals.every(v => v === vals[0]);
  const max = Math.max(1, ...vals), min = Math.min(0, ...vals);
  const w = 200, h = 34, pad = 3;
  const pts = vals.map((v,i) => {
    const x = pad + (vals.length===1 ? 0 : (i/(vals.length-1)) * (w-2*pad));
    const y = h - pad - ((v-min)/((max-min)||1)) * (h-2*pad);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const lastVal = vals[vals.length-1];
  const lastPt = pts.split(' ').pop().split(',');
  const thinNote = rows.length < MIN_POINTS_FOR_TREND
    ? `<div style="font-size:.62rem;color:var(--muted);margin-top:.1rem">only ${rows.length} data point${rows.length===1?'':'s'} so far — tracking started this session, real trend needs a day or two</div>`
    : (allSame ? `<div style="font-size:.62rem;color:var(--muted);margin-top:.1rem">flat and genuinely unchanged across ${rows.length} checks — not a display bug</div>` : '');
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.6"/>
    <circle cx="${lastPt[0]}" cy="${lastPt[1]}" r="2.6" fill="${color}"/>
  </svg><div style="font-size:.65rem;color:var(--muted);margin-top:.1rem">now: ${lastVal}${opts.suffix||''}</div>${thinNote}`;
}

function render(data) {
  if (!data) return;
  document.getElementById('lu').textContent = toSGT(data.updated) + '  (SGT, UTC+8)';
  renderStaleness();
  const bl = getBL();
  const teams = data.teams || [];
  const classTeams = teams.filter(t=>!t.is_ultra);

  const tagged  = classTeams.filter(t=>t.sprint_tag_present).length;
  const failing = classTeams.filter(t=>t.last_run_conclusion==='failure').length;
  const active  = classTeams.filter(t=>(t.days_since_commit||99)<=2).length;
  const prs     = classTeams.reduce((s,t)=>s+(t.open_prs||0),0);

  const bl_tagged  = bl ? Object.values(bl).filter(t=>t.tag).length : null;
  const bl_failing = bl ? Object.values(bl).filter(t=>t.run==='failure').length : null;
  const bl_prs     = bl ? Object.values(bl).reduce((s,t)=>s+(t.prs||0),0) : null;

  function dBadge(now, prev, goodUp=true) {
    if(prev===null||prev===undefined) return '';
    const d=now-prev;
    if(d===0) return '<span class="dbadge d0">Δ0</span>';
    const good = goodUp ? d>0 : d<0;
    return `<span class="dbadge ${good?'dup':'ddn'}">${d>0?'+':''}${d}</span>`;
  }

  const failingTeams = classTeams.filter(t=>t.last_run_conclusion==='failure');
  const failLinks = failingTeams.map(t=>`<a class="ev" href="${t.last_run_url}" target="_blank" style="font-size:.62rem;display:block;">→ ${t.name}</a>`).join('');

  document.getElementById('summary').innerHTML =
    `<div class="sc"><div class="val ${tagged===5?'ok':tagged>=3?'gold':'danger'}">${tagged}/5</div><div class="lbl">${SPRINT} Tagged</div>${dBadge(tagged,bl_tagged,true)}</div>` +
    `<div class="sc"><div class="val ${failing>0?'danger':'ok'}">${failing}</div><div class="lbl">Failures</div>${dBadge(failing,bl_failing,false)}${failLinks ? `<div style="margin-top:.3rem">${failLinks}</div>` : ''}</div>` +
    `<div class="sc"><div class="val gold">${active}</div><div class="lbl">Active 48h</div></div>` +
    `<div class="sc"><div class="val ${prs>0?'warn':'teal'}">${prs}</div><div class="lbl">Open PRs</div>${dBadge(prs,bl_prs,false)}</div>` +
    `<div class="sc"><div class="val teal">${toSGT(data.updated,"time")}</div><div class="lbl">Last Pull SGT</div></div>`;

  const nowSGT = new Date(Date.now() + 8*60*60*1000);
  const dow = nowSGT.getUTCDay();
  const wn = document.getElementById('weekendnote');
  if (dow === 0 || dow === 6) {
    wn.style.display = 'block';
    wn.textContent = '📅 Weekend, SGT — markets are closed but this is prime working time: no class, Friday close data is in, teams should be pulling data, running agents, and doing LLM synthesis right now. Silence today is a stronger red flag than on a weekday, not a pass.';
  } else {
    wn.style.display = 'none';
  }

  let h = '';
  let mondayHtml = '<h2>📋 Monday Talking Points</h2>';
  for (const t of teams) {
    const tbl = bl ? bl[t.name] : null;
    const tags = (t.tags||[]).slice(0,6);
    const pr_d = tbl ? (t.open_prs||0)-(tbl.prs||0) : null;
    const newC = tbl && t.last_commit_sha !== tbl.sha;
    const newF = tbl && t.last_run_conclusion==='failure' && tbl.run!=='failure';
    const rec  = tbl && t.last_run_conclusion==='success' && tbl.run==='failure';
    const newT = tbl && t.sprint_tag_present && !tbl.tag;
    const v = verdict(t);
    const isUltra = !!t.is_ultra;

    h += `<div class="tc ${isUltra?'ultra':cc(t)}">
      <div class="th">
        <div>
          <div class="tn">${t.name} ${isUltra?'<span class="ultra-badge">YOU + CLAUDE</span>':''}
            ${newC?'<span class="inl inl-new">new commit</span>':''}
            ${newF?'<span class="inl inl-fail">⚠️ new failure</span>':''}
            ${rec ?'<span class="inl inl-new">✅ recovered</span>':''}
            ${newT?'<span class="inl inl-new">🏷 tag cut!</span>':''}
          </div>
          <div class="trepo"><a class="ev" href="${t.repo_url||('https://github.com/'+t.repo)}" target="_blank">${t.repo}</a></div>
        </div>
        <div class="thr">${isUltra?'':`<span class="tp">Prac ${t.prac}</span>`}<div class="dot ${isUltra?'dg':dc(t)}"></div></div>
      </div>
      <div class="tb">
        <div class="verdict ${isUltra?'v-ok':v.cls}"><span>${isUltra?'🟣':v.icon}</span><div><span class="vlabel">${isUltra?'BUILDING':v.label}</span> — ${isUltra?'Our enhanced engine, tracked the same way as the 5 student teams for a fair side-by-side comparison.':v.reason}</div></div>

        ${!isUltra ? `<div class="row"><span class="rl">${SPRINT} tag</span>${t.sprint_tag_present?'<span class="rv ok">✅ Cut</span>':'<span class="rv fail">❌ Not yet</span>'}</div>
        <div class="row"><span class="rl">Tags</span><span>${tags.length?tags.map(chip).join(''):'<span style="color:var(--muted)">none</span>'}</span></div>
        <hr class="sep">` : ''}

        <div class="row"><span class="rl">Last commit</span><span class="rv"><a class="ev" href="${t.last_commit_url}" target="_blank">${toSGT(t.last_commit_date,'short')}</a>${newC?'<span class="inl inl-new">Δ new</span>':''}</span></div>
        <div class="cmsg"><a class="ev" href="${t.last_commit_url}" target="_blank">${t.last_commit_sha||''}</a> · ${t.last_commit_author||''}<br>${t.last_commit_msg||''}</div>
        <div class="row"><span class="rl">Days idle</span><span class="rv ${(t.days_since_commit||0)>5?'fail':(t.days_since_commit||0)>2?'warn':''}">${t.days_since_commit??'—'}</span></div>
        <hr class="sep">

        <div class="row"><span class="rl">Who's active</span></div>
        <div class="contrib-wrap">${contributorChips(t)}</div>
        ${!isUltra ? discordSignalHtml(t.name) : ''}
        <hr class="sep">

        <div class="row"><span class="rl">Pipeline</span><a class="ev" href="${t.last_run_url}" target="_blank">${runIco(t.last_run_conclusion)}</a></div>
        <div class="row" style="font-size:.72rem"><span class="rl">Run</span><span style="color:var(--muted);text-align:right"><a class="ev" href="${t.last_run_url}" target="_blank">${t.last_run_name||'—'}</a> · ${toSGT(t.last_run_date,'short')}</span></div>
        <hr class="sep">

        <div class="row"><span class="rl">Open PRs</span>
          <span class="rv ${(t.open_prs||0)>0?'warn':''}">${t.open_prs||0}
            ${pr_d!==null&&pr_d!==0?`<span class="inl ${pr_d>0?'inl-warn':'inl-new'}">${pr_d>0?'+':''}${pr_d} since baseline</span>`:''}
            ${pr_d===0?'<span class="inl" style="background:rgba(143,163,191,.1);color:var(--muted)">Δ0</span>':''}
          </span>
        </div>
        ${(t.pr_links||[]).slice(0,4).map(p=>`<div class="pr-item">#${p.number} <a href="${p.url}" target="_blank">${p.title}</a> <span class="pr-auth">by ${p.author}</span></div>`).join('')}
        <hr class="sep">

        <div class="spark-wrap"><div class="spark-lbl">Total commits this sprint window (momentum)</div>${sparkline(t.name,'total_commits','var(--success)',{suffix:' commits'})}</div>
        <div class="spark-wrap"><div class="spark-lbl">Days since last commit (resets on new activity)</div>${sparkline(t.name,'days_idle','var(--warn)',{suffix:' days'})}</div>
      </div>
      <a class="rlink" href="https://github.com/${t.repo}" target="_blank">Open on GitHub →</a>
    </div>`;

    if (!isUltra) {
      mondayHtml += `<div class="qteam"><b>${t.name}</b> (${t.repo})<div class="q">${mondayQuestion(t)}</div></div>`;
    }
  }
  document.getElementById('grid').innerHTML = h;
  document.getElementById('monday').innerHTML = mondayHtml;
}

(async function(){
  const embedded = JSON.parse(atob(B64));
  current = embedded;
  if (!getBL()) setBL(embedded);
  history_ = await fetchHistory();
  discord_ = await fetchDiscordSignals();
  render(embedded);
  doRefresh();
  startTimer();
})();
</script>
