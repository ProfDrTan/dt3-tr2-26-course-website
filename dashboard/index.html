<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DT3 Pipeline Dashboard · Prof Dr Tan</title>
<style>
:root{--navy:#0a1628;--navy-2:#0d1f3c;--navy-3:#112244;--gold:#c9a84c;--teal:#2dd4bf;--white:#f0f4fa;--muted:#8fa3bf;--success:#3dcc8a;--danger:#e05c5c;--warn:#f0a500;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--navy);color:var(--white);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;}
#pin-gate{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.pin-box{background:var(--navy-2);border:1px solid rgba(201,168,76,.3);border-radius:16px;padding:2.5rem;text-align:center;max-width:340px;width:100%;}
.pin-box h2{color:var(--gold);font-size:1.3rem;margin-bottom:.5rem;}
.pin-box p{color:var(--muted);font-size:.85rem;margin-bottom:1.5rem;}
.pin-box input{background:var(--navy-3);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:var(--white);font-size:1.4rem;letter-spacing:.4em;padding:.75rem 1rem;text-align:center;width:100%;margin-bottom:1rem;outline:none;}
.pin-box input:focus{border-color:var(--gold);}
.pin-box button{background:var(--gold);color:#071426;font-weight:900;padding:.75rem;border-radius:99px;border:none;cursor:pointer;width:100%;font-size:.95rem;}
.pin-error{color:var(--danger);font-size:.82rem;margin-top:.5rem;display:none;}
#dashboard{display:none;}
header{background:linear-gradient(135deg,#070e1c,var(--navy-3));border-bottom:2px solid var(--gold);padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;}
.h1{font-size:1.25rem;color:var(--gold);font-weight:700;}
.hsub{font-size:.75rem;color:var(--muted);margin-top:.15rem;}
.live-badge{background:rgba(61,204,138,.15);color:var(--success);border:1px solid rgba(61,204,138,.3);border-radius:99px;padding:.25rem .75rem;font-size:.72rem;font-weight:700;}
main{max-width:1200px;margin:0 auto;padding:1.5rem 1.25rem 3rem;}

/* status bar */
.status-bar{background:var(--navy-2);border-radius:10px;padding:.75rem 1.25rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;font-size:.8rem;}
.status-left{color:var(--muted);}
.status-left span{color:var(--white);font-weight:600;}
.status-right{display:flex;gap:.75rem;align-items:center;}
.rbtn{background:rgba(45,212,191,.12);color:var(--teal);border:1px solid rgba(45,212,191,.25);border-radius:6px;padding:.35rem .9rem;font-size:.78rem;cursor:pointer;font-weight:600;}
.rbtn:hover{background:rgba(45,212,191,.2);}
.rbtn:active{transform:scale(.97);}
.reset-btn{background:rgba(143,163,191,.08);color:var(--muted);border:1px solid rgba(143,163,191,.15);border-radius:6px;padding:.35rem .9rem;font-size:.78rem;cursor:pointer;}
.countdown{color:var(--teal);font-weight:600;font-size:.78rem;}

/* summary */
.summary-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:.75rem;margin-bottom:1.5rem;}
.sc{background:var(--navy-2);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:.9rem;text-align:center;position:relative;}
.sc .val{font-size:1.7rem;font-weight:800;line-height:1;color:var(--teal);}
.sc .val.ok{color:var(--success);}.sc .val.gold{color:var(--gold);}.sc .val.danger{color:var(--danger);}
.sc .lbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:.35rem;}
.sc .delta{position:absolute;top:.5rem;right:.6rem;font-size:.7rem;font-weight:700;border-radius:4px;padding:.1rem .35rem;}
.delta-up{background:rgba(61,204,138,.15);color:var(--success);}
.delta-down{background:rgba(224,92,92,.15);color:var(--danger);}
.delta-zero{background:rgba(143,163,191,.1);color:var(--muted);}

/* teams */
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem;}
.tc{background:var(--navy-2);border:1px solid rgba(255,255,255,.08);border-radius:12px;overflow:hidden;transition:border-color .3s;}
.tc.healthy{border-color:rgba(61,204,138,.2);}
.tc.warning{border-color:rgba(240,165,0,.3);}
.tc.failing{border-color:rgba(224,92,92,.35);}
.th{padding:.85rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);}
.tn{font-size:.95rem;font-weight:700;}
.trepo{font-size:.68rem;color:var(--muted);margin-top:.1rem;}
.th-right{display:flex;align-items:center;gap:.5rem;}
.tp{font-size:.68rem;color:var(--muted);background:rgba(255,255,255,.05);padding:.1rem .45rem;border-radius:4px;}
.dot{width:9px;height:9px;border-radius:50%;}
.dg{background:var(--success);box-shadow:0 0 5px var(--success);}
.dr{background:var(--danger);box-shadow:0 0 5px var(--danger);}
.do{background:var(--warn);box-shadow:0 0 5px var(--warn);}

/* team body rows */
.tb{padding:.85rem 1rem;display:flex;flex-direction:column;gap:.5rem;}
.row{display:flex;justify-content:space-between;align-items:center;gap:.5rem;font-size:.82rem;min-height:1.4rem;}
.rl{color:var(--muted);white-space:nowrap;flex-shrink:0;font-size:.78rem;}
.rv{color:var(--white);text-align:right;word-break:break-word;}
.rv.ok{color:var(--success);font-weight:600;}
.rv.fail{color:var(--danger);font-weight:600;}
.rv.warn{color:var(--warn);}

/* delta badge on rows */
.d-badge{display:inline-block;font-size:.68rem;font-weight:700;padding:.05rem .3rem;border-radius:3px;margin-left:.35rem;vertical-align:middle;}
.d-new{background:rgba(61,204,138,.2);color:var(--success);}
.d-warn{background:rgba(240,165,0,.2);color:var(--warn);}
.d-fail{background:rgba(224,92,92,.2);color:var(--danger);}

.chip{display:inline-block;padding:.08rem .4rem;border-radius:4px;font-size:.7rem;font-weight:600;margin:.08rem;}
.cok{background:rgba(61,204,138,.15);color:var(--success);}
.cwarn{background:rgba(240,165,0,.15);color:var(--warn);}
.cgrey{background:rgba(143,163,191,.1);color:var(--muted);}
.cmsg{font-size:.72rem;color:var(--muted);border-left:2px solid rgba(45,212,191,.15);padding-left:.5rem;margin-top:.15rem;word-break:break-word;line-height:1.4;}
.divider{border:none;border-top:1px solid rgba(255,255,255,.05);margin:.2rem 0;}
.rlink{display:block;padding:.55rem 1rem;border-top:1px solid rgba(255,255,255,.04);font-size:.74rem;color:var(--teal);text-decoration:none;}
.rlink:hover{background:rgba(45,212,191,.04);}

footer{border-top:1px solid rgba(201,168,76,.12);padding:1rem 1.5rem;text-align:center;font-size:.72rem;color:var(--muted);}
@media(max-width:700px){.summary-strip{grid-template-columns:repeat(3,1fr);}.teams-grid{grid-template-columns:1fr;}}
</style>
</head>

  <div class="pin-box">
    <h2>🔒 Instructor Dashboard</h2>
    <p>CP3405 DT3 TR2 2026 · Prof Dr Tan only</p>

  <footer>CP3405 DT3 TR2 2026 · Instructor Dashboard · Private · Auto-refreshes every 2 minutes</footer>
</div>

// ── PIN ───────────────────────────────────────────────────────────────────────
function checkPin() {
  if (document.getElementById('pin-input').value.trim() === PIN) {
    document.getElementById('pin-gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    init();
  } else {
    document.getElementById('pin-error').style.display = 'block';
    document.getElementById('pin-input').value = '';
  }
}
(function(){
  const p = new URLSearchParams(location.search);
  if (p.get('pin') === PIN) {
    document.getElementById('pin-gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    init();
  }
})();

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentData = null;
let refreshTimer = null;
let countdownVal = 120;

function getBaseline() {
  try { return JSON.parse(localStorage.getItem(DELTA_KEY) || 'null'); }
  catch(e) { return null; }
}

function saveBaseline(data) {
  const bl = {};
  for (const t of data.teams) {
    bl[t.name] = {
      open_prs: t.open_prs || 0,
      last_run_conclusion: t.last_run_conclusion,
      sprint_tag_present: t.sprint_tag_present,
      last_commit_sha: t.last_commit_sha,
      days_since_commit: t.days_since_commit
    };
  }
  localStorage.setItem(DELTA_KEY, JSON.stringify({ts: Date.now(), teams: bl}));
}

function resetDeltas() {
  if (currentData) {
    saveBaseline(currentData);
    render(currentData);
    alert('Delta baseline reset to current values.');
  }
}

// ── FETCH ─────────────────────────────────────────────────────────────────────
async function fetchLatest() {
  try {
    const r = await fetch(
      'https://api.github.com/repos/ProfDrTan/dt3-monitor/contents/dt3_dashboard.json',
      { headers: { 'Accept': 'application/vnd.github+json' }, cache: 'no-store' }
    );
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const meta = await r.json();
    return JSON.parse(atob(meta.content.replace(/\s/g, '')));
  } catch(e) {
    console.warn('GitHub API fetch failed:', e.message);
    return null;
  }
}

async function doRefresh() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '↻ Loading...';
  btn.disabled = true;

  const data = await fetchLatest();
  if (data) {
    currentData = data;
    render(data);
    if (!getBaseline()) saveBaseline(data);
  }

  btn.textContent = '↻ Refresh Now';
  btn.disabled = false;
  countdownVal = 120;
}

function startCountdown() {
  if (refreshTimer) clearInterval(refreshTimer);
  countdownVal = 120;
  refreshTimer = setInterval(async () => {
    countdownVal--;
    const m = Math.floor(countdownVal / 60);
    const s = String(countdownVal % 60).padStart(2, '0');
    document.getElementById('countdown').textContent = `Refreshing in ${m}:${s}`;
    if (countdownVal <= 0) {
      countdownVal = 120;
      await doRefresh();
    }
  }, 1000);
}

async function init() {
  // Show embedded data immediately
  const embedded = JSON.parse(atob(DATA_B64));
  currentData = embedded;
  if (!getBaseline()) saveBaseline(embedded);
  render(embedded);

  // Then fetch latest from GitHub
  const fresh = await fetchLatest();
  if (fresh) {
    currentData = fresh;
    render(fresh);
  }

  startCountdown();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function tagChip(t) {
  const c = t === SPRINT ? 'cok' : /^v?W\d+$/.test(t) ? 'cwarn' : 'cgrey';
  return `<span class="chip ${c}">${t}</span>`;
}

function runIcon(c) {
  if (c === 'success') return '<span class="rv ok">✅ passing</span>';
  if (c === 'failure') return '<span class="rv fail">❌ FAILED</span>';
  return '<span class="rv" style="color:var(--muted)">—</span>';
}

function cardCls(t) {
  if (t.last_run_conclusion === 'failure') return 'failing';
  if (!t.sprint_tag_present) return 'warning';
  if ((t.days_since_commit || 0) > 5) return 'warning';
  return 'healthy';
}

function dotCls(t) {
  if (t.last_run_conclusion === 'failure') return 'dr';
  if (!t.sprint_tag_present) return 'do';
  return 'dg';
}

function deltaBadge(label, now, prev) {
  if (prev === undefined || prev === null) return '';
  const diff = now - prev;
  if (diff > 0) return `<span class="d-badge d-new">+${diff} ${label}</span>`;
  if (diff < 0) return `<span class="d-badge d-warn">${diff} ${label}</span>`;
  return '';
}

function render(data) {
  document.getElementById('last-updated').textContent = data.updated;
  const bl = getBaseline();
  const teams = data.teams || [];

  // ── Summary ──
  const tagged  = teams.filter(t => t.sprint_tag_present).length;
  const failing  = teams.filter(t => t.last_run_conclusion === 'failure').length;
  const active   = teams.filter(t => (t.days_since_commit || 99) <= 2).length;
  const prs      = teams.reduce((s,t) => s + (t.open_prs||0), 0);
  const commits  = teams.filter(t => t.last_commit_sha).length;

  const bl_prs     = bl ? Object.values(bl.teams).reduce((s,t) => s+(t.open_prs||0), 0) : null;
  const bl_failing = bl ? Object.values(bl.teams).filter(t => t.last_run_conclusion==='failure').length : null;
  const bl_tagged  = bl ? Object.values(bl.teams).filter(t => t.sprint_tag_present).length : null;

  const prs_diff     = bl_prs !== null ? prs - bl_prs : null;
  const failing_diff = bl_failing !== null ? failing - bl_failing : null;
  const tagged_diff  = bl_tagged !== null ? tagged - bl_tagged : null;

  function sumDelta(val, diff, goodUp=true) {
    if (diff === null || diff === 0) return '<span class="delta delta-zero">Δ0</span>';
    const isGood = goodUp ? diff > 0 : diff < 0;
    return `<span class="delta ${isGood?'delta-up':'delta-down'}">${diff>0?'+':''}${diff}</span>`;
  }

  document.getElementById('summary').innerHTML = `
    <div class="sc">
      <div class="val ${tagged===5?'ok':tagged>=3?'gold':'danger'}">${tagged}/5</div>
      <div class="lbl">${SPRINT} Tagged</div>
      ${sumDelta(tagged, tagged_diff, true)}
    </div>
    <div class="sc">
      <div class="val ${failing>0?'danger':'ok'}">${failing}</div>
      <div class="lbl">Failures</div>
      ${sumDelta(failing, failing_diff, false)}
    </div>
    <div class="sc">
      <div class="val gold">${active}</div>
      <div class="lbl">Active 48h</div>
    </div>
    <div class="sc">
      <div class="val ${prs>0?'warn':''}">${prs}</div>
      <div class="lbl">Open PRs</div>
      ${prs_diff !== null ? `<span class="delta ${prs_diff>0?'delta-up':'prs_diff<0?delta-down':delta-zero'}">${prs_diff>0?'+':''}${prs_diff!==0?prs_diff:'Δ0'}</span>` : ''}
    </div>
    <div class="sc">
      <div class="val">${data.updated.slice(11,16)}</div>
      <div class="lbl">Last Pull UTC</div>
    </div>`;

  // ── Team cards ──
  let h = '';
  for (const t of teams) {
    const tbl = bl ? bl.teams[t.name] : null;
    const tags = (t.tags||[]).slice(0,6);

    const pr_diff = tbl ? (t.open_prs||0) - (tbl.open_prs||0) : null;
    const newCommit = tbl && t.last_commit_sha !== tbl.last_commit_sha;
    const newFailure = tbl && t.last_run_conclusion === 'failure' && tbl.last_run_conclusion !== 'failure';
    const recovered  = tbl && t.last_run_conclusion === 'success' && tbl.last_run_conclusion === 'failure';
    const newTag     = tbl && t.sprint_tag_present && !tbl.sprint_tag_present;

    h += `<div class="tc ${cardCls(t)}">
      <div class="th">
        <div>
          <div class="tn">${t.name}
            ${newCommit ? '<span class="d-badge d-new">new commit</span>' : ''}
            ${newFailure ? '<span class="d-badge d-fail">⚠️ new failure</span>' : ''}
            ${recovered  ? '<span class="d-badge d-new">✅ recovered</span>' : ''}
            ${newTag     ? '<span class="d-badge d-new">🏷 tag cut!</span>' : ''}
          </div>
          <div class="trepo">${t.repo}</div>
        </div>
        <div class="th-right">
          <span class="tp">Prac ${t.prac}</span>
          <div class="dot ${dotCls(t)}"></div>
        </div>
      </div>
      <div class="tb">
        <div class="row">
          <span class="rl">${SPRINT} tag</span>
          ${t.sprint_tag_present
            ? '<span class="rv ok">✅ Cut</span>'
            : '<span class="rv fail">❌ Not yet</span>'}
        </div>
        <div class="row">
          <span class="rl">All tags</span>
          <span>${tags.length ? tags.map(tagChip).join('') : '<span style="color:var(--muted)">none</span>'}</span>
        </div>
        <hr class="divider">
        <div class="row">
          <span class="rl">Last commit</span>
          <span class="rv">${t.last_commit_date||'—'}${newCommit?'<span class="d-badge d-new">Δ new</span>':''}</span>
        </div>
        <div class="cmsg">${t.last_commit_sha||''} · ${t.last_commit_author||''}<br>${t.last_commit_msg||''}</div>
        <div class="row">
          <span class="rl">Days idle</span>
          <span class="rv ${(t.days_since_commit||0)>5?'fail':(t.days_since_commit||0)>2?'warn':''}">${t.days_since_commit??'—'} days</span>
        </div>
        <hr class="divider">
        <div class="row">
          <span class="rl">Pipeline</span>
          ${runIcon(t.last_run_conclusion)}
        </div>
        <div class="row" style="font-size:.72rem">
          <span class="rl">Run name</span>
          <span style="color:var(--muted);text-align:right">${t.last_run_name||'—'}</span>
        </div>
        <hr class="divider">
        <div class="row">
          <span class="rl">Open PRs</span>
          <span class="rv ${(t.open_prs||0)>0?'warn':''}">${t.open_prs||0}
            ${pr_diff !== null && pr_diff !== 0
              ? `<span class="d-badge ${pr_diff>0?'d-warn':'d-new'}">${pr_diff>0?'+':''}${pr_diff} since baseline</span>`
              : (pr_diff === 0 ? '<span class="d-badge" style="background:rgba(143,163,191,.1);color:var(--muted)">Δ0</span>' : '')}
          </span>
        </div>
      </div>
      <a class="rlink" href="https://github.com/${t.repo}" target="_blank">Open on GitHub →</a>
    </div>`;
  }
  document.getElementById('teams').innerHTML = h;
}
</script>
</body>
</html>
